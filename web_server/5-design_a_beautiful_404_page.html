<!DOCTYPE html>
<html lang="en">
  <head>
    <title>404 - Lost in Translation</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital@1&display=swap");

      :root {
        --bg-deep: #05161a;
        --bg-mid: #072e33;
        --accent: #0c7075;
        --gold: #fabd02;
        --gold-glow: rgba(250, 189, 2, 0.2);
        --text: #e0f2f1;
        --text-dim: rgba(224, 242, 241, 0.6);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-deep);
        font-family: "Inter", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text);
        overflow: hidden;
        position: relative;
      }

      /* Noise Texture Overlay */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3");
        opacity: 0.04;
        pointer-events: none;
        z-index: 10;
      }

      /* Floating Ambient Orbs */
      .orb {
        position: absolute;
        width: 60vh;
        height: 60vh;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.4;
        z-index: 0;
        animation: rotate 20s linear infinite;
      }

      .orb-1 {
        background: var(--accent);
        top: -10%;
        left: -10%;
      }

      .orb-2 {
        background: #022c33;
        bottom: -15%;
        right: -10%;
        animation-direction: reverse;
        animation-duration: 25s;
      }

      @keyframes rotate {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, -50px) scale(1.1); }
        66% { transform: translate(-30px, 40px) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }

      main {
        position: relative;
        z-index: 5;
        width: 100%;
        max-width: 540px;
        padding: 3rem;
        background: rgba(7, 46, 51, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(12, 112, 117, 0.2);
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
        animation: slideUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .status-tag {
        display: inline-block;
        padding: 0.5rem 1.2rem;
        background: rgba(12, 112, 117, 0.15);
        border: 1px solid var(--accent);
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--gold);
        margin-bottom: 2rem;
      }

      .big-text {
        font-size: 6rem;
        font-weight: 300;
        line-height: 1;
        margin-bottom: 1rem;
        letter-spacing: -0.05em;
        color: white;
      }

      .line {
        width: 40px;
        height: 1px;
        background: var(--gold);
        margin: 2rem auto;
      }

      .artistic-quote {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 1.6rem;
        color: var(--text);
        margin-bottom: 1.5rem;
        position: relative;
        display: inline-block;
      }

      .artistic-quote::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
      }

      .translation {
        font-size: 0.85rem;
        color: var(--text-dim);
        margin-bottom: 2.5rem;
        font-weight: 300;
        letter-spacing: 0.05em;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }

      .btn {
        text-decoration: none;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 1.2rem 3rem;
        border-radius: 12px;
        width: 100%;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--bg-deep);
        box-shadow: 0 10px 20px var(--gold-glow);
      }

      .btn-primary:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 30px var(--gold-glow);
        filter: brightness(1.1);
      }

      .btn-secondary {
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.02);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .footer-id {
        margin-top: 3rem;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main>
      <div class="status-tag">Error Protocol 404</div>
      <h1 class="big-text">Void</h1>
      
      <div class="artistic-quote">Ceci n'est pas une page</div>
      <p class="translation">This is not a page</p>

      <div class="actions">
        <a href="/" class="btn btn-primary">Return to Reality</a>
        <a href="mailto:support@iaxcel.tech" class="btn btn-secondary">Report Drift</a>
      </div>

      <p class="footer-id">Ref: ALX-WEB-01 // SERVER-NODE-9</p>
    </main>
  </body>
</html>
